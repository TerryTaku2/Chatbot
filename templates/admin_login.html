<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/uploads/welcome_banner.png"/>
  <link rel="apple-touch-icon" href="/uploads/welcome_banner.png"/>
  <title>Admin Login — T-Tech Connect</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;
         display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.12);
          width:100%;max-width:380px;overflow:hidden}
    .card-header{background:#075e54;padding:32px 28px;text-align:center;color:#fff}
    .logo{font-size:26px;font-weight:800;letter-spacing:-.5px}
    .tagline{font-size:13px;opacity:.75;margin-top:4px}
    .card-body{padding:28px}
    h2{font-size:17px;font-weight:700;color:#111827;margin-bottom:18px}
    .error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;
           border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:700;color:#374151;
          text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
    input[type=password]{width:100%;padding:11px 14px;border:1.5px solid #d1d5db;
                         border-radius:9px;font-size:14px;transition:border-color .2s}
    input:focus{outline:none;border-color:#075e54;box-shadow:0 0 0 3px rgba(7,94,84,.08)}
    .btn{width:100%;padding:13px;background:#075e54;color:#fff;border:none;
         border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;
         margin-top:18px;transition:background .2s}
    .btn:hover{background:#064e45}
    .note{font-size:12px;color:#9ca3af;text-align:center;margin-top:14px}
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">T-Tech Connect</div>
    <div class="tagline">Admin Panel</div>
  </div>
  <div class="card-body">
    <h2>Sign in to continue</h2>
    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter admin password"
             autofocus required>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <p class="note">Authorised personnel only</p>
  </div>
</div>
</body>
</html>
