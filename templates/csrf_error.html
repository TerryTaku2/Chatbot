<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Expired — T-Tech Connect</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;margin:0;padding:24px;display:flex;align-items:center;justify-content:center;min-height:100vh;box-sizing:border-box}
  .card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);max-width:400px;width:100%;padding:32px 24px;text-align:center}
  .icon{font-size:44px;margin-bottom:12px}
  h1{font-size:19px;color:#111827;margin:0 0 10px}
  p{font-size:14px;color:#6b7280;line-height:1.5;margin:0 0 22px}
  a.btn{display:inline-block;background:#075e54;color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:12px 24px;border-radius:8px}
  a.btn:active{opacity:.85}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⏱️</div>
    <h1>Your session expired</h1>
    <p>This can happen if the page was open for a while before submitting (for example, while finding your ID photo). Nothing was lost on our end — please go back and submit the form again.</p>
    <a class="btn" href="{{ back_url }}">Go back and try again</a>
  </div>
</body>
</html>
